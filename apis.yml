    name: NIFC ArcGIS REST Services API
    tags:
      - ArcGIS
      - Geospatial
      - Wildfire
    humanURL: https://data-nifc.opendata.arcgis.com
    baseURL: https://services3.arcgis.com/T4QMspbfLg3qTGWY/ArcGIS/rest/services
    properties:
      - url: https://data-nifc.opendata.arcgis.com
        type: Documentation
      - url: https://services3.arcgis.com/T4QMspbfLg3qTGWY/ArcGIS/rest/services
        type: Documentation
      - url: https://raw.githubusercontent.com/api-evangelist/national-interagency-fire-center/main/openapi/national-interagency-fire-center-openapi.yml
        type: OpenAPI
    description: >-
      The NIFC ArcGIS REST services expose FeatureServer endpoints with
      authoritative geospatial data on wildfire incidents, fire
      perimeters, dispatch boundaries, fuel treatments, weather stations,
      and other fire management resources. Each FeatureServer supports
      attribute and spatial queries, paging, statistics, and standard
      ArcGIS output formats including JSON and GeoJSON.
